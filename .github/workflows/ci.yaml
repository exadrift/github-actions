name: perform CI release workflow
permissions:
  # the write permission is necessary to create the base tag, which reflects the repo state
  # prior to any state finalization, even after merge, the pre-merge commit point needs to be known
  # in order to see which items need post-merge steps based on prior changes
  contents: write
  checks: read

on:
  push:
    branches:
      - "**"

jobs:
  create-change-matrix:
    runs-on: ubuntu-24.04
    name: get directories containing changes
    outputs:
      directories: ${{ steps.get-changed-dirs.outputs.directories }}
    steps:
      # always checks out sources
      - id: get-changed-dirs
        uses: exadrift/github-actions/changed-dirs@initial_actions

  do-matrix-action:
    name: ${{ matrix.item.name }} directory matrix actions
    needs: create-change-matrix
    runs-on: ubuntu-24.04
    if: needs.create-change-matrix.outputs.directories != '[]'
    strategy:
      matrix:
        item: ${{ fromJson(needs.create-change-matrix.outputs.directories) }}
    defaults:
      run:
        working-directory: ${{ matrix.item.path }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: exadrift/github-actions/is-default@initial_actions
        id: is-default
      - uses: exadrift/github-actions/versioning@initial_actions
        id: versioning
        with:
          # not covered by run.working-directory
          working-directory: ${{ matrix.item.path }}
          tag-prefix: ${{ matrix.item.name }}-
      - if: ${{ steps.is-default.outputs.is-default == 'true' }}
        uses: exadrift/github-actions/release@initial_actions
        with:
          working-directory: ${{ matrix.item.path }}
          tags: ${{ matrix.item.name }}-${{ steps.versioning.outputs.version }},${{ matrix.item.name }}-${{ steps.versioning.outputs.version-major }}
          description: release of ${{ matrix.item.name }} github action

  update-base-tag:
    runs-on: ubuntu-24.04
    name: update base tag
    needs:
      - do-matrix-action
    steps:
      - name: update base tag
        uses: exadrift/github-actions/changed-dirs@initial_actions
        with:
          update-base-tag: true
